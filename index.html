      /**
       * Liga todos os eventos da UI do viewer (botões, atalhos, etc.).
       * Deve ser chamada toda vez que o viewer é renderizado.
       */
      function bindViewerEvents() {
        const close = $("#closeViewer");
        if (close) close.onclick = closeTemplate;

        const fs = $("#fullscreenBtn");
        if (fs)
          fs.onclick = () => {
            state.fullscreen = !state.fullscreen;
            update();
          };

        // Iframe loading
        const frame = $("#viewerFrame");
        const loadingEl = $("#viewerLoading");
        if (frame) {
          frame.addEventListener("load", () => {
            frame.classList.add("loaded");
            if (loadingEl) loadingEl.classList.add("hidden");
          });
        }

        // Device toggle
        $$("#deviceToggle button[data-device]").forEach((b) => {
          b.onclick = () => {
            state.device = b.dataset.device;
            saveStorage(STORAGE.device, state.device);
            update();
          };
        });

        // Favoritar
        const favBtn = $("#favViewer");
        if (favBtn)
          favBtn.onclick = () => {
            const nowFav = toggleFavorite(state.viewingId);
            showToast(
              nowFav ? "Adicionado aos favoritos" : "Removido dos favoritos",
              "star",
            );
            update();
          };

        // Copiar código fonte do template
        const copyBtn = $("#copyCodeBtn");
        if (copyBtn) copyBtn.onclick = copyTemplateCode;

        // Copiar link (compartilhar)
        const shareBtn = $("#shareBtn");
        if (shareBtn) shareBtn.onclick = shareCurrent;
      }

      /* ===================================================================
   AÇÕES DO VIEWER — copiar código / compartilhar link
   =================================================================== */

      /**
       * Baixa o HTML do template aberto e copia para o clipboard.
       * Mostra toast com sucesso/erro.
       */
      async function copyTemplateCode() {
        const found = findTemplateById(state.viewingId);
        if (!found) return;
        try {
          const r = await fetch(found.template.path);
          if (!r.ok) throw new Error("HTTP " + r.status);
          const txt = await r.text();
          await navigator.clipboard.writeText(txt);
          showToast("Código copiado para o clipboard", "check");
        } catch (e) {
          showToast("Não foi possível copiar o código", "warning");
        }
      }

      /**
       * Copia a URL atual (incluindo hash) para o clipboard.
       */
      async function shareCurrent() {
        try {
          await navigator.clipboard.writeText(location.href);
          showToast("Link copiado", "link");
        } catch (e) {
          showToast("Não foi possível copiar o link", "warning");
        }
      }

      /* ===================================================================
   LAZY LOADING DE PREVIEWS  (IntersectionObserver)
   =================================================================== */

      let previewObserver = null;

      /**
       * Inicializa (uma única vez) o IntersectionObserver que carrega
       * iframes de preview apenas quando entram na viewport.
       * Performance: hub com 50+ templates não fica lento.
       */
      function initPreviewObserver() {
        if (previewObserver) return;
        previewObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              const wrap = entry.target;
              const src = wrap.dataset.src;
              if (!src || wrap.dataset.loaded) return;

              const iframe = document.createElement("iframe");
              iframe.src = src;
              iframe.loading = "lazy";
              iframe.sandbox = "allow-same-origin";
              iframe.setAttribute("scrolling", "no");
              iframe.setAttribute("title", "Preview");
              iframe.addEventListener("load", () => {
                iframe.classList.add("loaded");
                const sk = wrap.querySelector(".skeleton");
                if (sk) sk.classList.add("hidden");
              });
              wrap.appendChild(iframe);
              wrap.dataset.loaded = "1";
              previewObserver.unobserve(wrap);
            });
          },
          { rootMargin: "200px 0px" },
        );
      }

      /**
       * Registra todos os .tpl-preview presentes no DOM atual,
       * para o observer começar a observá-los.
       */
      function observeAllPreviews() {
        initPreviewObserver();
        $$(".tpl-preview[data-src]").forEach((el) => {
          if (!el.dataset.observed) {
            previewObserver.observe(el);
            el.dataset.observed = "1";
          }
        });
      }

      /* ===================================================================
   TOAST NOTIFICATIONS
   =================================================================== */

      /**
       * Exibe um toast por ~2,5s no canto inferior direito.
       * @param {string} msg
       * @param {"check"|"warning"|"link"|"star"} [icon]
       */
      function showToast(msg, icon = "check") {
        const wrap = $("#toastWrap");
        const el = document.createElement("div");
        el.className = "toast";
        el.innerHTML = toastIcon(icon) + `<span>${escapeHtml(msg)}</span>`;
        wrap.appendChild(el);
        setTimeout(() => {
          el.classList.add("out");
          setTimeout(() => el.remove(), 250);
        }, 2400);
      }

      function toastIcon(kind) {
        switch (kind) {
          case "warning":
            return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
          case "link":
            return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
          case "star":
            return `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
          default:
            return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>`;
        }
      }

      /* ===================================================================
   COMMAND PALETTE  (⌘K)
   =================================================================== */

      const cmdk = {
        open: false,
        query: "",
        items: [],
        highlight: 0,
      };

      /** Abre o command palette. */
      function openCmdk() {
        cmdk.open = true;
        cmdk.query = "";
        cmdk.highlight = 0;
        $("#cmdkBackdrop").classList.add("open");
        $("#cmdk").classList.add("open");
        $("#cmdkInput").value = "";
        buildCmdkItems();
        renderCmdkResults();
        setTimeout(() => $("#cmdkInput").focus(), 30);
      }

      /** Fecha o command palette. */
      function closeCmdk() {
        cmdk.open = false;
        $("#cmdkBackdrop").classList.remove("open");
        $("#cmdk").classList.remove("open");
      }

      /**
       * Constrói a lista de itens (comandos + templates + categorias)
       * que o command palette pode mostrar.
       */
      function buildCmdkItems() {
        const items = [];

        // Comandos globais
        items.push(
          {
            kind: "cmd",
            title: "Ir para Todos os templates",
            group: "Comandos",
            icon: "home",
            run: goHome,
          },
          {
            kind: "cmd",
            title: "Ir para Favoritos",
            group: "Comandos",
            icon: "star",
            run: goFavorites,
          },
          {
            kind: "cmd",
            title: "Ir para Vistos recentemente",
            group: "Comandos",
            icon: "clock",
            run: goRecent,
          },
          {
            kind: "cmd",
            title: "Alternar tema (claro/escuro)",
            group: "Comandos",
            icon: "theme",
            run: toggleTheme,
          },
          {
            kind: "cmd",
            title: "Mudar para visão Grid",
            group: "Comandos",
            icon: "grid",
            run: () => setView("grid"),
          },
          {
            kind: "cmd",
            title: "Mudar para visão Lista",
            group: "Comandos",
            icon: "list",
            run: () => setView("list"),
          },
        );

        // Categorias
        const walk = (nodes, trail) => {
          nodes.forEach((n) => {
            const path = [...trail, n];
            items.push({
              kind: "cat",
              title: n.name,
              sub: path.map((x) => x.name).join(" / "),
              group: "Categorias",
              icon: "folder",
              run: () => {
                state.virtualPath = null;
                state.viewingId = null;
                state.path = path.map((x) => x.id);
                update();
              },
            });
            if (n.children) walk(n.children, path);
          });
        };
        walk(CATALOG.categories, []);

        // Templates
        collectAllTemplates().forEach((t) => {
          items.push({
            kind: "tpl",
            title: t.title,
            sub: t._category,
            tags: (t.tags || []).join(" "),
            group: "Templates",
            icon: "file",
            run: () => openTemplate(t.id),
          });
        });

        cmdk.items = items;
      }

      /**
       * Filtra a lista do palette pela query atual e devolve a versão
       * mostrada. Retorna no máximo 30 itens para manter snappy.
       * @returns {object[]}
       */
      function filteredCmdkItems() {
        const q = cmdk.query.toLowerCase().trim();
        if (!q) return cmdk.items.slice(0, 30);
        return cmdk.items
          .filter((it) => {
            const hay =
              `${it.title} ${it.sub || ""} ${it.tags || ""}`.toLowerCase();
            return hay.includes(q);
          })
          .slice(0, 30);
      }

      /** Renderiza a lista filtrada do command palette. */
      function renderCmdkResults() {
        const root = $("#cmdkResults");
        const items = filteredCmdkItems();
        cmdk.highlight = Math.min(
          cmdk.highlight,
          Math.max(0, items.length - 1),
        );

        if (!items.length) {
          root.innerHTML = `<div class="cmdk-empty">Nenhum resultado.</div>`;
          return;
        }

        // Agrupa por "group"
        const groups = {};
        items.forEach((it) => {
          (groups[it.group] = groups[it.group] || []).push(it);
        });

        let idx = 0;
        const html = Object.entries(groups)
          .map(
            ([group, list]) => `
    <div class="cmdk-group">
      <div class="cmdk-group-label">${group}</div>
      ${list
        .map((it) => {
          const hl = idx === cmdk.highlight ? "hl" : "";
          const out = `
          <div class="cmdk-item ${hl}" data-idx="${idx}">
            <span class="ic">${cmdkIcon(it.icon)}</span>
            <div class="body">
              <div class="title">${escapeHtml(it.title)}</div>
              ${it.sub ? `<div class="sub">${escapeHtml(it.sub)}</div>` : ""}
            </div>
            <span class="kbd-hint">${it.kind === "tpl" ? "abrir" : "ir"}</span>
          </div>`;
          idx++;
          return out;
        })
        .join("")}
    </div>
  `,
          )
          .join("");

        root.innerHTML = html;

        // Liga cliques
        $$(".cmdk-item").forEach((el) => {
          el.onclick = () => {
            const i = parseInt(el.dataset.idx, 10);
            const target = filteredCmdkItems()[i];
            if (target) {
              closeCmdk();
              target.run();
            }
          };
          el.onmouseenter = () => {
            cmdk.highlight = parseInt(el.dataset.idx, 10);
            $$(".cmdk-item").forEach((e) => e.classList.toggle("hl", e === el));
          };
        });
      }

      /** Move o highlight no palette (-1 = cima, +1 = baixo). */
      function moveCmdkHighlight(delta) {
        const total = filteredCmdkItems().length;
        if (!total) return;
        cmdk.highlight = (cmdk.highlight + delta + total) % total;
        $$(".cmdk-item").forEach((el) => {
          el.classList.toggle(
            "hl",
            parseInt(el.dataset.idx, 10) === cmdk.highlight,
          );
        });
        // Garante que o item selecionado fica visível
        const el = $(`.cmdk-item[data-idx="${cmdk.highlight}"]`);
        if (el) el.scrollIntoView({ block: "nearest" });
      }

      /** Executa o item destacado. */
      function commitCmdk() {
        const items = filteredCmdkItems();
        const target = items[cmdk.highlight];
        if (target) {
          closeCmdk();
          target.run();
        }
      }

      function cmdkIcon(kind) {
        const stroke = `fill="none" stroke="currentColor" stroke-width="2"`;
        switch (kind) {
          case "home":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`;
          case "star":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
          case "clock":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
          case "theme":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
          case "grid":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`;
          case "list":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`;
          case "folder":
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>`;
          case "file":
          default:
            return `<svg width="14" height="14" viewBox="0 0 24 24" ${stroke}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
        }
      }

      /* ===================================================================
   ATALHOS DE TECLADO
   =================================================================== */

      /**
       * Trata todos os atalhos globais e contextuais.
       * @param {KeyboardEvent} e
       */
      function handleHotkeys(e) {
        // Detecta se o usuário está digitando em um campo de texto qualquer
        const tag = (e.target.tagName || "").toLowerCase();
        const typing =
          tag === "input" || tag === "textarea" || e.target.isContentEditable;

        // ⌘K / Ctrl+K → abre command palette de qualquer lugar
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
          e.preventDefault();
          openCmdk();
          return;
        }

        // Esc → fecha viewer/palette/menu (não consome se nada estiver aberto)
        if (e.key === "Escape") {
          if (cmdk.open) {
            closeCmdk();
            return;
          }
          if (state.fullscreen) {
            state.fullscreen = false;
            update();
            return;
          }
          if (state.viewingId) {
            closeTemplate();
            return;
          }
          return;
        }

        // Dentro do command palette: setas e enter
        if (cmdk.open) {
          if (e.key === "ArrowDown") {
            e.preventDefault();
            moveCmdkHighlight(+1);
          }
          if (e.key === "ArrowUp") {
            e.preventDefault();
            moveCmdkHighlight(-1);
          }
          if (e.key === "Enter") {
            e.preventDefault();
            commitCmdk();
          }
          return;
        }

        // Não interpretar atalhos enquanto digita
        if (typing) return;

        // Atalhos contextuais do viewer
        if (state.viewingId) {
          if (e.key === "f" || e.key === "F") {
            state.fullscreen = !state.fullscreen;
            update();
          }
          if (e.key === "d" || e.key === "D") {
            state.device = "desktop";
            saveStorage(STORAGE.device, state.device);
            update();
          }
          if (e.key === "t" || e.key === "T") {
            state.device = "tablet";
            saveStorage(STORAGE.device, state.device);
            update();
          }
          if (e.key === "m" || e.key === "M") {
            state.device = "mobile";
            saveStorage(STORAGE.device, state.device);
            update();
          }
          if (e.key === "c" || e.key === "C") {
            copyTemplateCode();
          }
          if (e.key === "j" || e.key === "J") {
            navigateSibling(+1);
          }
          if (e.key === "k" || e.key === "K") {
            navigateSibling(-1);
          }
        }
      }

      /**
       * No viewer, navega para o próximo/anterior template da mesma listagem
       * (mesma categoria, na ordem atualmente filtrada/ordenada).
       * @param {number} delta  +1 = próximo, -1 = anterior
       */
      function navigateSibling(delta) {
        // Reconstrói a lista que estava ativa antes de abrir o viewer
        // (a partir da trilha do template aberto)
        const found = findTemplateById(state.viewingId);
        if (!found) return;
        const parent = found.trail[found.trail.length - 1];
        const list = applyFilters(collectAllTemplates([parent]));
        applySort(list);
        const idx = list.findIndex((t) => t.id === state.viewingId);
        if (idx === -1) return;
        const nextIdx = (idx + delta + list.length) % list.length;
        openTemplate(list[nextIdx].id);
      }

      /* ===================================================================
   TEMA
   =================================================================== */

      /**
       * Aplica um tema e atualiza ícones + localStorage.
       * @param {"dark"|"light"} theme
       */
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("#iconMoon").style.display = theme === "dark" ? "block" : "none";
        $("#iconSun").style.display = theme === "dark" ? "none" : "block";
        saveStorage(STORAGE.theme, theme);
      }
      /** Alterna entre dark e light. */
      function toggleTheme() {
        const cur =
          document.documentElement.getAttribute("data-theme") || "dark";
        applyTheme(cur === "dark" ? "light" : "dark");
      }
      /** Lê tema salvo ou usa "dark" como padrão. */
      function initTheme() {
        applyTheme(loadStorage(STORAGE.theme, "dark"));
      }

      /**
       * Define o modo de visualização (grid ou list) e persiste.
       * @param {"grid"|"list"} v
       */
      function setView(v) {
        state.view = v;
        saveStorage(STORAGE.view, v);
        $("#viewGrid").classList.toggle("active", v === "grid");
        $("#viewList").classList.toggle("active", v === "list");
        update();
      }

      /* ===================================================================
   UPDATE CENTRAL
   Re-renderiza tudo conforme o `state` atual.
   =================================================================== */

      /**
       * Função-mestre de renderização. Pode ser chamada à vontade —
       * é o ponto único de saída de qualquer mudança de estado.
       */
      function update() {
        writeHash();

        const viewing = !!state.viewingId;
        const found = viewing ? findTemplateById(state.viewingId) : null;
        const level = getCurrentLevel();

        // Shell (sempre renderiza)
        renderQuickNav();
        renderTree();
        renderBreadcrumb(found);
        renderHeader(level, found);
        renderFilters();

        // Conteúdo central
        if (viewing) {
          $("#content").innerHTML = renderViewer();
          bindViewerEvents();
        } else {
          const subsHtml = renderSubcategories(level);
          const tplHtml = renderTemplates(level);
          $("#content").innerHTML = subsHtml + tplHtml;

          // Liga cliques nas pastas
          $$(".folder-card[data-go]").forEach((btn) => {
            btn.onclick = () => {
              state.path = [...state.path, btn.dataset.go];
              state.virtualPath = null;
              update();
              window.scrollTo({ top: 0, behavior: "smooth" });
            };
          });

          // Liga cliques nos cards de template
          $$(".tpl-card[data-open]").forEach((card) => {
            card.onclick = (e) => {
              // Se o clique foi no botão favorito, não abre o template
              if (e.target.closest("[data-fav]")) return;
              openTemplate(card.dataset.open);
            };
          });

          // Botões de favoritar nos cards
          $$("[data-fav]").forEach((b) => {
            b.onclick = (e) => {
              e.stopPropagation();
              const nowFav = toggleFavorite(b.dataset.fav);
              showToast(
                nowFav ? "Adicionado aos favoritos" : "Removido dos favoritos",
                "star",
              );
              update();
            };
          });

          // Empty state → "limpar filtros"
          $$("[data-clear]").forEach((a) => (a.onclick = clearFilters));

          // Lazy load dos previews
          observeAllPreviews();
        }

        // Fecha menu hambúrguer mobile depois de qualquer interação
        $("#app").classList.remove("menu-open");
      }

      /* ===================================================================
   EVENTOS GLOBAIS (bind feito uma vez no boot)
   =================================================================== */
      function bindGlobalEvents() {
        // Logo e busca
        $("#logoBtn").onclick = goHome;
        $("#searchBtn").onclick = (e) => {
          // Se o input já está focado, deixa digitar; senão abre palette
          if (document.activeElement !== $("#quickSearch")) openCmdk();
        };
        // Para o input agir como "atalho" — sempre delega para o palette
        $("#quickSearch").addEventListener("focus", () => {
          openCmdk();
          $("#quickSearch").blur();
        });

        // Toggle tema, menu mobile, view, sort
        $("#themeToggle").onclick = toggleTheme;
        $("#menuToggle").onclick = () =>
          $("#app").classList.toggle("menu-open");
        $("#viewGrid").onclick = () => setView("grid");
        $("#viewList").onclick = () => setView("list");
        $("#sortSelect").onchange = (e) => {
          state.sort = e.target.value;
          saveStorage(STORAGE.sort, state.sort);
          update();
        };

        // Command palette
        $("#cmdkBackdrop").onclick = closeCmdk;
        $("#cmdkInput").addEventListener("input", (e) => {
          cmdk.query = e.target.value;
          cmdk.highlight = 0;
          renderCmdkResults();
        });

        // Hash do navegador (back/forward)
        window.addEventListener("popstate", () => {
          readHash();
          update();
        });
        window.addEventListener("hashchange", () => {
          readHash();
          update();
        });

        // Hotkeys
        document.addEventListener("keydown", handleHotkeys);
      }

      /* ===================================================================
   UTILS
   =================================================================== */

      /**
       * Escapa caracteres HTML em uma string para evitar injection
       * ao inserir conteúdo do data.js diretamente no DOM via innerHTML.
       * @param {string} str
       * @returns {string}
       */
      function escapeHtml(str) {
        if (str == null) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      /* ===================================================================
   BOOT
   =================================================================== */
      hydrateState(); // 1. carrega tema, view, sort, favs, history
      initTheme(); // 2. aplica tema visualmente
      bindGlobalEvents(); // 3. registra todos os event listeners
      readHash(); // 4. lê a URL inicial
      // 5. sincroniza UI controlada (view/sort) com state
      $("#viewGrid").classList.toggle("active", state.view === "grid");
      $("#viewList").classList.toggle("active", state.view === "list");
      $("#sortSelect").value = state.sort;
      update(); // 6. renderiza tudo
    </script>
  </body>
</html>
