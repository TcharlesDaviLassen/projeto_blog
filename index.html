<!doctype html>
<html lang="pt-br" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Templates · Hub</title>
    <meta
      name="description"
      content="Hub moderno de templates HTML. Navegação por categorias, busca instantânea, previews ao vivo."
    />

    <!-- Fontes do estilo "Geist": Inter (UI) + JetBrains Mono (números/código) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ===================================================================
   DESIGN TOKENS
   Variáveis CSS centralizadas: alterar aqui muda o app inteiro.
   Convenção shadcn/ui — temas dark e light com mesma API.
   =================================================================== */
      :root[data-theme="dark"] {
        --bg: #0a0a0a;
        --bg-elev: #111111;
        --bg-elev-2: #161616;
        --bg-hover: #1a1a1a;
        --border: #272727;
        --border-hover: #3a3a3a;
        --fg: #fafafa;
        --fg-muted: #a1a1a1;
        --fg-subtle: #6b6b6b;
        --brand: #3b82f6;
        --brand-soft: rgba(59, 130, 246, 0.12);
        --success: #22c55e;
        --warning: #eab308;
        --danger: #ef4444;
        --star: #fbbf24;
        --ring: rgba(255, 255, 255, 0.08);
        --shadow:
          0 1px 0 rgba(255, 255, 255, 0.03),
          0 8px 24px -12px rgba(255, 255, 255, 0.6);
        --backdrop: rgba(0, 0, 0, 0.7);

        --radius: 10px;
        --radius-sm: 6px;
        --radius-lg: 14px;
      }
      :root[data-theme="light"] {
        --bg: #ffffff;
        --bg-elev: #fafafa;
        --bg-elev-2: #f4f4f5;
        --bg-hover: #f4f4f5;
        --border: #e4e4e7;
        --border-hover: #d4d4d8;
        --fg: #0a0a0a;
        --fg-muted: #52525b;
        --fg-subtle: #a1a1aa;
        --brand: #2563eb;
        --brand-soft: rgba(37, 99, 235, 0.1);
        --success: #16a34a;
        --warning: #ca8a04;
        --danger: #dc2626;
        --star: #f59e0b;
        --ring: rgba(0, 0, 0, 0.06);
        --shadow:
          0 1px 0 rgba(0, 0, 0, 0.02), 0 8px 24px -12px rgba(0, 0, 0, 0.527);
        --backdrop: rgba(255, 255, 255, 0.7);

        --radius: 10px;
        --radius-sm: 6px;
        --radius-lg: 14px;
      }

      /* ===== Reset enxuto ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }
      html,
      body {
        background: var(--bg);
        color: var(--fg);
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
        font-feature-settings: "cv11", "ss01";
      }
      ::selection {
        background: var(--fg);
        color: var(--bg);
      }
      button {
        font: inherit;
        color: inherit;
        background: transparent;
        border: none;
        cursor: pointer;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      input,
      select {
        font: inherit;
        color: inherit;
        background: transparent;
        border: none;
        outline: none;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ===================================================================
   LAYOUT — topbar + sidebar + main (app shell)
   =================================================================== */
      .app {
        display: grid;
        grid-template-columns: 260px 1fr;
        grid-template-rows: 56px 1fr;
        grid-template-areas:
          "topbar topbar"
          "sidebar main";
        min-height: 100vh;
      }

      /* ===================================================================
   TOPBAR
   =================================================================== */
      .topbar {
        grid-area: topbar;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 50;
        backdrop-filter: saturate(180%) blur(8px);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.01em;
        min-width: 220px;
        cursor: pointer;
      }
      .logo .mark {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        background: var(--fg);
        color: var(--bg);
        border-radius: 6px;
        font-weight: 700;
        font-size: 13px;
      }
      .logo .slash {
        color: var(--fg-subtle);
        font-weight: 400;
        margin: 0 -2px;
      }
      .logo .scope {
        color: var(--fg-muted);
        font-weight: 500;
        font-size: 13px;
      }

      .search {
        flex: 1;
        max-width: 520px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-elev);
        transition:
          border-color 0.15s,
          background 0.15s;
        cursor: text;
      }
      .search:hover {
        border-color: var(--border-hover);
      }
      .search:focus-within {
        border-color: var(--border-hover);
        background: var(--bg-elev-2);
        box-shadow: 0 0 0 4px var(--ring);
      }
      .search svg {
        flex-shrink: 0;
        color: var(--fg-subtle);
      }
      .search input {
        flex: 1;
        font-size: 13px;
      }
      .search input::placeholder {
        color: var(--fg-subtle);
      }
      .search kbd {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--fg-muted);
        background: var(--bg);
      }

      .topbar .actions {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: var(--radius-sm);
        color: var(--fg-muted);
        transition:
          background 0.15s,
          color 0.15s;
        position: relative;
      }
      .icon-btn:hover {
        background: var(--bg-elev-2);
        color: var(--fg);
      }

      /* Tooltip simples nos icon-btn */
      .icon-btn[data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        padding: 4px 8px;
        background: var(--fg);
        color: var(--bg);
        border-radius: 4px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 100;
      }

      /* ===================================================================
   SIDEBAR — árvore de categorias + atalhos
   =================================================================== */
      .sidebar {
        grid-area: sidebar;
        border-right: 1px solid var(--border);
        background: var(--bg);
        padding: 20px 12px;
        overflow-y: auto;
        height: calc(100vh - 56px);
        position: sticky;
        top: 56px;
      }
      .side-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--fg-subtle);
        padding: 16px 10px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .side-label:first-child {
        padding-top: 0;
      }
      .tree {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .tree-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        color: var(--fg-muted);
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s;
        text-align: left;
        width: 100%;
      }
      .tree-item:hover {
        background: var(--bg-elev-2);
        color: var(--fg);
      }
      .tree-item.active {
        background: var(--bg-elev-2);
        color: var(--fg);
        font-weight: 500;
      }
      .tree-item .chev {
        width: 14px;
        height: 14px;
        display: grid;
        place-items: center;
        color: var(--fg-subtle);
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .tree-item.expanded .chev {
        transform: rotate(90deg);
      }
      .tree-item .ico {
        width: 16px;
        height: 16px;
        display: grid;
        place-items: center;
        color: var(--fg-subtle);
        flex-shrink: 0;
      }
      .tree-item.active .ico {
        color: var(--brand);
      }
      .tree-item .ico.star {
        color: var(--star);
      }
      .tree-item .name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree-item .count {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--fg-subtle);
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--bg-elev-2);
      }
      .tree-item.active .count {
        background: var(--bg);
      }

      .tree-children {
        display: none;
        margin-left: 13px;
        padding-left: 11px;
        border-left: 1px solid var(--border);
        flex-direction: column;
        gap: 2px;
        margin-top: 2px;
        margin-bottom: 4px;
      }
      .tree-children.open {
        display: flex;
      }

      /* ===================================================================
   MAIN
   =================================================================== */
      .main {
        grid-area: main;
        padding: 32px 40px 80px;
        max-width: 1400px;
        width: 100%;
      }

      /* Breadcrumb */
      .breadcrumb {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--fg-muted);
        margin-bottom: 8px;
      }
      .breadcrumb a {
        cursor: pointer;
        transition: color 0.12s;
      }
      .breadcrumb a:hover {
        color: var(--fg);
      }
      .breadcrumb .sep {
        color: var(--fg-subtle);
        display: grid;
        place-items: center;
      }
      .breadcrumb .here {
        color: var(--fg);
        font-weight: 500;
      }

      /* Cabeçalho da página */
      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding: 14px 0 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
      }
      .page-head h1 {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 6px;
      }
      .page-head .lead {
        color: var(--fg-muted);
        font-size: 14px;
        max-width: 60ch;
      }
      .page-head .stats {
        display: flex;
        gap: 16px;
        flex-shrink: 0;
      }
      .stat-pill {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-elev);
        text-align: center;
      }
      .stat-pill .v {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .stat-pill .k {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg-subtle);
        margin-top: 4px;
      }

      /* ===================================================================
   FILTROS / TOOLBAR
   =================================================================== */
      .filters {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 11px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--bg-elev);
        font-size: 12px;
        color: var(--fg-muted);
        transition: all 0.12s;
      }
      .chip:hover {
        border-color: var(--border-hover);
        color: var(--fg);
      }
      .chip.active {
        background: var(--fg);
        color: var(--bg);
        border-color: var(--fg);
      }
      .toolbar-right {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .select-sort {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-elev);
        font-size: 12px;
        color: var(--fg-muted);
        cursor: pointer;
      }
      .select-sort:hover {
        color: var(--fg);
        border-color: var(--border-hover);
      }
      .select-sort select {
        cursor: pointer;
        padding-right: 4px;
      }
      .view-toggle {
        display: flex;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: var(--bg-elev);
      }
      .view-toggle button {
        padding: 6px 10px;
        font-size: 12px;
        color: var(--fg-muted);
        display: grid;
        place-items: center;
      }
      .view-toggle button:hover {
        color: var(--fg);
      }
      .view-toggle button.active {
        background: var(--bg-elev-2);
        color: var(--fg);
      }

      /* ===================================================================
   FOLDER CARDS  (subcategorias)
   =================================================================== */
      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 14px;
      }
      .section-title h2 {
        font-size: 13px;
        font-weight: 600;
        color: var(--fg);
      }
      .section-title .more {
        font-size: 12px;
        color: var(--fg-muted);
      }

      .folders {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
        margin-bottom: 36px;
      }
      .folder-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-elev);
        text-align: left;
        width: 100%;
        transition: all 0.15s;
      }
      .folder-card:hover {
        border-color: var(--border-hover);
        background: var(--bg-elev-2);
        transform: translateY(-1px);
      }
      .folder-card .ico-wrap {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-sm);
        background: var(--brand-soft);
        color: var(--brand);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .folder-card .info {
        flex: 1;
        min-width: 0;
      }
      .folder-card .name {
        font-size: 14px;
        font-weight: 500;
        color: var(--fg);
        margin-bottom: 2px;
      }
      .folder-card .meta {
        font-size: 12px;
        color: var(--fg-muted);
      }
      .folder-card .arr {
        color: var(--fg-subtle);
        flex-shrink: 0;
      }

      /* ===================================================================
   TEMPLATE CARDS  (grid view) + skeleton + lazy
   =================================================================== */
      .templates.grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
      }
      .tpl-card {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        /* border-radius: var(--radius-lg); */
        background: var(--bg-elev);
        overflow: hidden;
        position: relative;
        transition: all 0.2s;
        cursor: pointer;
      }
      .tpl-card:hover {
        border-color: var(--border-hover);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        /* border-radius: var(--radius); */
        scale: 1.01;
      }

      .tpl-preview {
        aspect-ratio: 16 / 10;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev-2);
        position: relative;
        overflow: hidden;
      }
      .tpl-preview iframe {
        width: 200%;
        height: 200%;
        border: 0;
        transform: scale(0.5);
        transform-origin: 0 0;
        pointer-events: none;
        background: #fff;
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      .tpl-preview iframe.loaded {
        opacity: 1;
      }

      /* Skeleton enquanto não carregou */
      .tpl-preview .skeleton {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          var(--bg-elev-2) 0%,
          var(--bg-hover) 50%,
          var(--bg-elev-2) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s ease-in-out infinite;
      }
      .tpl-preview .skeleton.hidden {
        display: none;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .tpl-preview .open-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(10, 10, 10, 0.55);
        opacity: 0;
        transition: opacity 0.15s;
        backdrop-filter: blur(2px);
        pointer-events: none;
      }
      .tpl-card:hover .open-overlay {
        opacity: 1;
      }
      .tpl-preview .open-overlay span {
        padding: 8px 14px;
        background: #fff;
        color: #0a0a0a;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* Botão de favoritar (estrela) no canto do card */
      .fav-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 2;
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        color: rgba(255, 255, 255, 0.7);
        transition: all 0.15s;
        opacity: 0;
      }
      .tpl-card:hover .fav-btn,
      .fav-btn.is-fav {
        opacity: 1;
      }
      .fav-btn:hover {
        background: rgba(0, 0, 0, 0.75);
        color: var(--star);
        transform: scale(1.05);
      }
      .fav-btn.is-fav {
        color: var(--star);
      }
      .fav-btn.is-fav svg {
        fill: var(--star);
      }

      .tpl-body {
        padding: 14px 16px 16px;
      }
      .tpl-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }
      .tpl-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg);
        letter-spacing: -0.005em;
        line-height: 1.3;
      }
      .tpl-cat {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--fg-subtle);
        text-transform: lowercase;
        white-space: nowrap;
        margin-top: 1px;
      }
      .tpl-desc {
        font-size: 13px;
        color: var(--fg-muted);
        line-height: 1.45;
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .tpl-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .tpl-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 2px 7px;
        background: var(--bg-elev-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--fg-muted);
      }

      /* ===================================================================
   TEMPLATE LIST view
   =================================================================== */
      .templates.list-view {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--bg-elev);
      }
      .templates.list-view .tpl-card {
        flex-direction: row;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid var(--border);
        align-items: center;
        padding: 0;
      }
      .templates.list-view .tpl-card:last-child {
        border-bottom: none;
      }
      .templates.list-view .tpl-card:hover {
        transform: none;
        box-shadow: none;
        background: var(--bg-elev-2);
      }
      .templates.list-view .tpl-preview {
        width: 140px;
        flex-shrink: 0;
        aspect-ratio: 16/10;
        border-right: 1px solid var(--border);
        border-bottom: none;
      }
      .templates.list-view .tpl-body {
        flex: 1;
        padding: 14px 18px;
      }
      .templates.list-view .tpl-desc {
        -webkit-line-clamp: 1;
        margin-bottom: 8px;
      }
      .templates.list-view .fav-btn {
        opacity: 1;
        position: static;
        margin-right: 14px;
      }

      /* ===================================================================
   TEMPLATE VIEWER (mantém shell)
   =================================================================== */
      .viewer {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elev);
        overflow: hidden;
        animation: fade-up 0.25s ease both;
      }
      .viewer-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev);
      }
      .viewer-info .meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        flex: 1;
      }
      .viewer-info .meta .ttl {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .viewer-info .meta .desc {
        font-size: 13px;
        color: var(--fg-muted);
      }
      .viewer-info .tags-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .viewer-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev-2);
      }
      .viewer-bar .dots {
        display: flex;
        gap: 6px;
      }
      .viewer-bar .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--bg-elev);
        border: 1px solid var(--border);
      }
      .viewer-bar .url {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--fg-muted);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .viewer-bar .url svg {
        flex-shrink: 0;
        color: var(--success);
      }
      .viewer-bar .url .file {
        color: var(--fg);
      }

      .viewer-bar .vw-actions {
        display: flex;
        gap: 4px;
      }
      .viewer-bar .vw-btn {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 12px;
        color: var(--fg-muted);
        background: var(--bg);
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: all 0.12s;
        position: relative;
      }
      .viewer-bar .vw-btn:hover {
        color: var(--fg);
        border-color: var(--border-hover);
      }
      .viewer-bar .vw-btn.primary {
        background: var(--fg);
        color: var(--bg);
        border-color: var(--fg);
      }
      .viewer-bar .vw-btn.primary:hover {
        opacity: 0.88;
        color: var(--bg);
      }
      .viewer-bar .vw-btn.is-fav svg {
        fill: var(--star);
        color: var(--star);
      }
      .viewer-bar .vw-btn[data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        top: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        padding: 4px 8px;
        background: var(--fg);
        color: var(--bg);
        border-radius: 4px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 100;
      }

      .device-toggle {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        background: var(--bg);
      }
      .device-toggle button {
        padding: 6px 10px;
        font-size: 12px;
        color: var(--fg-muted);
        display: grid;
        place-items: center;
      }
      .device-toggle button:hover {
        color: var(--fg);
      }
      .device-toggle button.active {
        background: var(--bg-elev-2);
        color: var(--fg);
      }

      .viewer-stage {
        background:
          linear-gradient(45deg, var(--bg-elev-2) 25%, transparent 25%),
          linear-gradient(-45deg, var(--bg-elev-2) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--bg-elev-2) 75%),
          linear-gradient(-45deg, transparent 75%, var(--bg-elev-2) 75%);
        background-size: 16px 16px;
        background-position:
          0 0,
          0 8px,
          8px -8px,
          -8px 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        min-height: 600px;
        position: relative;
      }
      .viewer-frame {
        width: 100%;
        height: 720px;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 40px -16px rgba(0, 0, 0, 0.5);
        transition:
          max-width 0.3s ease,
          opacity 0.25s ease;
      }
      .viewer-frame:not(.loaded) {
        opacity: 0;
      }
      .viewer-stage[data-device="tablet"] .viewer-frame {
        max-width: 820px;
      }
      .viewer-stage[data-device="mobile"] .viewer-frame {
        max-width: 390px;
      }

      /* Spinner durante carregamento do iframe principal */
      .viewer-loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--fg-muted);
        pointer-events: none;
      }
      .viewer-loading.hidden {
        display: none;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Modo tela cheia */
      .viewer.fullscreen {
        position: fixed;
        inset: 56px 0 0 0;
        z-index: 30;
        border-radius: 0;
        border: none;
        border-top: 1px solid var(--border);
      }
      .viewer.fullscreen .viewer-stage {
        flex: 1;
        padding: 16px;
      }
      .viewer.fullscreen .viewer-frame {
        height: 100%;
      }

      /* ===================================================================
   EMPTY STATE
   =================================================================== */
      .empty {
        padding: 60px 24px;
        text-align: center;
        border: 1px dashed var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elev);
      }
      .empty .ico {
        width: 48px;
        height: 48px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--bg-elev-2);
        color: var(--fg-subtle);
      }
      .empty h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .empty p {
        color: var(--fg-muted);
        font-size: 13px;
      }
      .empty p a {
        color: var(--brand);
        text-decoration: underline;
        cursor: pointer;
      }

      /* ===================================================================
   COMMAND PALETTE (⌘K modal)
   =================================================================== */
      .cmdk-backdrop {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: var(--backdrop);
        backdrop-filter: blur(4px);
        display: none;
        animation: fade-in 0.12s ease both;
      }
      .cmdk-backdrop.open {
        display: block;
      }
      .cmdk {
        position: fixed;
        top: 15vh;
        left: 50%;
        transform: translateX(-50%);
        width: min(600px, calc(100% - 32px));
        z-index: 101;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elev);
        box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        display: none;
        animation: cmdk-in 0.18s ease both;
      }
      .cmdk.open {
        display: block;
      }
      @keyframes cmdk-in {
        from {
          opacity: 0;
          transform: translate(-50%, -8px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }
      .cmdk-search {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .cmdk-search svg {
        color: var(--fg-subtle);
        flex-shrink: 0;
      }
      .cmdk-search input {
        flex: 1;
        font-size: 14px;
      }
      .cmdk-search input::placeholder {
        color: var(--fg-subtle);
      }
      .cmdk-search kbd {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--fg-muted);
        background: var(--bg);
      }
      .cmdk-results {
        max-height: 50vh;
        overflow-y: auto;
        padding: 8px;
      }
      .cmdk-group {
        margin-bottom: 8px;
      }
      .cmdk-group:last-child {
        margin-bottom: 0;
      }
      .cmdk-group-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--fg-subtle);
        padding: 8px 8px 4px;
      }
      .cmdk-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 13px;
        color: var(--fg);
      }
      .cmdk-item.hl {
        background: var(--bg-elev-2);
      }
      .cmdk-item .ic {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        border-radius: 5px;
        background: var(--bg-elev-2);
        color: var(--fg-muted);
        flex-shrink: 0;
      }
      .cmdk-item.hl .ic {
        background: var(--bg);
        color: var(--fg);
      }
      .cmdk-item .body {
        flex: 1;
        min-width: 0;
      }
      .cmdk-item .title {
        font-weight: 500;
      }
      .cmdk-item .sub {
        font-size: 11px;
        color: var(--fg-subtle);
        margin-top: 1px;
        font-family: "JetBrains Mono", monospace;
      }
      .cmdk-item .kbd-hint {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--fg-subtle);
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--bg-elev-2);
      }
      .cmdk-empty {
        padding: 30px;
        text-align: center;
        color: var(--fg-muted);
        font-size: 13px;
      }
      .cmdk-foot {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 14px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--fg-subtle);
      }
      .cmdk-foot kbd {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 1px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        margin: 0 2px;
      }

      /* ===================================================================
   TOAST notifications
   =================================================================== */
      .toast-wrap {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--fg);
        color: var(--bg);
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.4);
        animation: toast-in 0.25s ease both;
      }
      .toast.out {
        animation: toast-out 0.25s ease both;
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes toast-out {
        to {
          opacity: 0;
          transform: translateY(8px);
        }
      }
      .toast svg {
        flex-shrink: 0;
      }

      /* ===================================================================
   FOOTER
   =================================================================== */
      .foot {
        margin-top: 60px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--fg-subtle);
      }

      /* ===================================================================
   RESPONSIVO
   =================================================================== */
      @media (max-width: 880px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-areas: "topbar" "main";
        }
        .sidebar {
          display: none;
        }
        .app.menu-open .sidebar {
          display: block;
          grid-area: unset;
          position: fixed;
          top: 56px;
          left: 0;
          width: 280px;
          height: calc(100vh - 56px);
          z-index: 40;
          border-right: 1px solid var(--border);
        }
        .main {
          padding: 20px 16px 60px;
        }
        .search {
          max-width: none;
        }
        .logo {
          min-width: 0;
        }
        .logo .slash,
        .logo .scope {
          display: none;
        }
        .page-head {
          flex-direction: column;
          gap: 16px;
        }
        .page-head .stats {
          width: 100%;
        }
        .stat-pill {
          flex: 1;
        }
        .menu-toggle {
          display: grid !important;
        }
        .viewer-info {
          flex-direction: column;
          align-items: flex-start;
        }
        .viewer-bar {
          flex-wrap: wrap;
        }
      }
      .menu-toggle {
        display: none;
      }

      /* ===================================================================
   ANIMAÇÕES
   =================================================================== */
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .tpl-card,
      .folder-card {
        animation: fade-up 0.25s ease both;
      }
      .tpl-card:nth-child(2),
      .folder-card:nth-child(2) {
        animation-delay: 0.03s;
      }
      .tpl-card:nth-child(3),
      .folder-card:nth-child(3) {
        animation-delay: 0.06s;
      }
      .tpl-card:nth-child(4),
      .folder-card:nth-child(4) {
        animation-delay: 0.09s;
      }
      .tpl-card:nth-child(5),
      .folder-card:nth-child(5) {
        animation-delay: 0.12s;
      }
      .tpl-card:nth-child(6),
      .folder-card:nth-child(6) {
        animation-delay: 0.15s;
      }
      .tpl-card:nth-child(7),
      .folder-card:nth-child(7) {
        animation-delay: 0.18s;
      }
      .tpl-card:nth-child(8),
      .folder-card:nth-child(8) {
        animation-delay: 0.21s;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <!-- ============== TOPBAR ============== -->
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Menu">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <a class="logo" id="logoBtn">
          <span class="mark">T</span>
          <span>templates</span>
          <span class="slash">/</span>
          <span class="scope">hub</span>
        </a>

        <!-- Botão que abre o Command Palette -->
        <button class="search" id="searchBtn" aria-label="Abrir busca (Ctrl+K)">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input
            id="quickSearch"
            type="search"
            placeholder="Buscar templates, tags ou categorias…"
            autocomplete="off"
          />
          <kbd>⌘ K</kbd>
        </button>

        <div class="actions">
          <button
            class="icon-btn"
            id="themeToggle"
            data-tip="Alternar tema"
            aria-label="Alternar tema"
          >
            <svg
              id="iconMoon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg
              id="iconSun"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="display: none"
            >
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              />
            </svg>
          </button>
          <a
            class="icon-btn"
            href="https://github.com"
            target="_blank"
            rel="noopener"
            data-tip="Repositório"
            aria-label="Repositório"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 .5C5.6.5.5 5.6.5 12c0 5.1 3.3 9.4 7.8 10.9.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2.9-.3 1.9-.4 2.9-.4s2 .1 2.9.4c2.2-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.1.8.8 1.2 1.9 1.2 3.1 0 4.5-2.7 5.5-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.5 4.6-1.5 7.8-5.8 7.8-10.9C23.5 5.6 18.4.5 12 .5z"
              />
            </svg>
          </a>
        </div>
      </header>

      <!-- ============== SIDEBAR ============== -->
      <aside class="sidebar" id="sidebar">
        <div class="side-label">Navegação</div>
        <div class="tree" id="quickNav"></div>

        <div class="side-label">Categorias</div>
        <div class="tree" id="categoryTree"></div>
      </aside>

      <!-- ============== MAIN ============== -->
      <main class="main">
        <nav
          class="breadcrumb"
          id="breadcrumb"
          aria-label="Trilha de navegação"
        ></nav>

        <div class="page-head">
          <div>
            <h1 id="pageTitle">Todos os templates</h1>
            <p class="lead" id="pageLead">
              Explore a coleção completa. Filtre, busque e abra templates em
              segundos.
            </p>
          </div>
          <div class="stats" id="pageStats">
            <div class="stat-pill">
              <div class="v" id="statTemplates">0</div>
              <div class="k">templates</div>
            </div>
            <div class="stat-pill">
              <div class="v" id="statCategories">0</div>
              <div class="k">categorias</div>
            </div>
          </div>
        </div>

        <!-- Filtros e toolbar -->
        <div class="filters" id="filters">
          <button class="chip" data-tag="" id="chipAll">Todos</button>
          <!-- chips de tag injetados via JS -->

          <div class="toolbar-right">
            <label class="select-sort" title="Ordenar">
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 6h18M6 12h12M10 18h4" />
              </svg>
              <select id="sortSelect">
                <option value="recent">Mais recentes</option>
                <option value="oldest">Mais antigos</option>
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
              </select>
            </label>
            <div class="view-toggle">
              <button
                id="viewGrid"
                class="active"
                aria-label="Visualização em grade"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="3" width="7" height="7" />
                  <rect x="14" y="3" width="7" height="7" />
                  <rect x="14" y="14" width="7" height="7" />
                  <rect x="3" y="14" width="7" height="7" />
                </svg>
              </button>
              <button id="viewList" aria-label="Visualização em lista">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <line x1="8" y1="6" x2="21" y2="6" />
                  <line x1="8" y1="12" x2="21" y2="12" />
                  <line x1="8" y1="18" x2="21" y2="18" />
                  <circle cx="4" cy="6" r="1" />
                  <circle cx="4" cy="12" r="1" />
                  <circle cx="4" cy="18" r="1" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Container onde subcategorias + templates ou viewer são renderizados -->
        <div id="content"></div>

        <footer class="foot">
          <span>Hub de templates · Desenvolvido por Tcharles Davi Lassen</span>
          <span
            >Pressione
            <kbd
              style="
                font-family: &quot;JetBrains Mono&quot;, monospace;
                font-size: 10px;
                padding: 1px 5px;
                border: 1px solid var(--border);
                border-radius: 3px;
              "
              >⌘K</kbd
            >
            para buscar</span
          >
        </footer>
      </main>
    </div>

    <!-- ============== COMMAND PALETTE (⌘K) ============== -->
    <div class="cmdk-backdrop" id="cmdkBackdrop"></div>
    <div class="cmdk" id="cmdk" role="dialog" aria-label="Paleta de comandos">
      <div class="cmdk-search">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input
          id="cmdkInput"
          type="text"
          placeholder="Buscar templates, categorias ou comandos…"
          autocomplete="off"
        />
        <kbd>Esc</kbd>
      </div>
      <div class="cmdk-results" id="cmdkResults"></div>
      <div class="cmdk-foot">
        <span><kbd>↑</kbd><kbd>↓</kbd> navegar</span>
        <span><kbd>↵</kbd> selecionar &nbsp;·&nbsp; <kbd>Esc</kbd> fechar</span>
      </div>
    </div>

    <!-- ============== TOASTS ============== -->
    <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

    <!-- Dados (catálogo de categorias e templates) -->
    <script src="data.js"></script>

    <script>
      /* ===================================================================
       *  TEMPLATE HUB — APP CORE
       * ===================================================================
       *  Tudo é client-side. O fluxo geral é:
       *
       *    1. Lê o hash da URL  (#/categoria/subcategoria  ou  #/view/:id)
       *    2. Atualiza `state`
       *    3. Re-renderiza shell (sidebar, breadcrumb, header)
       *       e área central (lista de templates OU viewer interno)
       *
       *  Persistência: `localStorage` guarda tema, view, ordenação,
       *  favoritos, histórico e pastas expandidas.
       * =================================================================== */

      /* ----- Atalhos genéricos de DOM ----------------------------------- */
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) =>
        Array.from(root.querySelectorAll(sel));

      /* ----- Chaves do localStorage ------------------------------------- */
      const STORAGE = {
        theme: "hub.theme", // "dark" | "light"
        view: "hub.view", // "grid" | "list"
        sort: "hub.sort", // "recent" | "oldest" | "az" | "za"
        device: "hub.device", // "desktop" | "tablet" | "mobile"
        favorites: "hub.favorites", // array de template ids
        history: "hub.history", // array de template ids (mais recente primeiro)
        expanded: "hub.expanded", // array de paths expandidos na sidebar
      };

      const HISTORY_LIMIT = 8; // máx. de itens no "Vistos recentemente"

      /* ===================================================================
   ESTADO DA APLICAÇÃO
   `state` é o objeto vivo que o resto do código consulta para saber
   o que renderizar. Cada `update()` lê este objeto e atualiza o DOM.
   =================================================================== */
      const state = {
        path: [], // caminho de ids: ex. ["simbolismo","alquimia"]
        query: "", // filtro de busca textual
        tag: "", // tag ativa (chip)
        view: "grid", // modo de visualização da lista
        sort: "recent", // ordenação dos templates
        viewingId: null, // id do template aberto no viewer (null = lista)
        device: "desktop", // preset de tamanho do iframe no viewer
        fullscreen: false, // viewer em tela cheia?
        favorites: new Set(), // ids favoritados
        history: [], // ids vistos recentemente (mais recente 1º)
        expanded: new Set(), // paths (string "a/b/c") expandidos na sidebar
        // virtual paths (para sidebar):
        // - "__favs"     → mostra todos os favoritos
        // - "__recent"   → mostra histórico
        virtualPath: null,
      };

      /* ===================================================================
   PERSISTÊNCIA — leitura segura do localStorage
   =================================================================== */

      /**
       * Lê um valor JSON do localStorage, com fallback.
       * @param {string} key   Chave em STORAGE.
       * @param {*}      fallback Valor padrão se não existir ou der erro.
       * @returns {*}
       */
      function loadStorage(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (raw === null) return fallback;
          return JSON.parse(raw);
        } catch (e) {
          return fallback;
        }
      }

      /**
       * Grava um valor no localStorage como JSON, silenciando erros
       * (ex. modo privado, quota excedida).
       * @param {string} key
       * @param {*} value
       */
      function saveStorage(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {}
      }

      /**
       * Inicializa o estado a partir do localStorage.
       * Roda uma vez no boot.
       */
      function hydrateState() {
        state.view = loadStorage(STORAGE.view, "grid");
        state.sort = loadStorage(STORAGE.sort, "recent");
        state.device = loadStorage(STORAGE.device, "desktop");
        state.favorites = new Set(loadStorage(STORAGE.favorites, []));
        state.history = loadStorage(STORAGE.history, []);
        state.expanded = new Set(loadStorage(STORAGE.expanded, []));
      }

      /* ===================================================================
   UTILITÁRIOS DE ÁRVORE
   Funções puras que operam sobre o CATALOG (data.js).
   =================================================================== */

      /**
       * Navega pela árvore seguindo um array de ids e devolve o nó final.
       * @param {string[]} path  Ex.: ["simbolismo","alquimia"]
       * @returns {object|null}  O nó (categoria) ou null se inválido.
       */
      function getNodeByPath(path) {
        let nodes = CATALOG.categories;
        let node = null;
        for (const id of path) {
          node = nodes.find((n) => n.id === id);
          if (!node) return null;
          nodes = node.children || [];
        }
        return node;
      }

      /**
       * Conta recursivamente quantos templates há em um nó (e descendentes).
       * @param {object} node
       * @returns {number}
       */
      function countTemplatesDeep(node) {
        let count = (node.templates || []).length;
        (node.children || []).forEach((c) => (count += countTemplatesDeep(c)));
        return count;
      }

      /**
       * Total de templates em todo o catálogo.
       * @returns {number}
       */
      function countAllTemplates() {
        return CATALOG.categories.reduce(
          (sum, c) => sum + countTemplatesDeep(c),
          0,
        );
      }

      /**
       * Conta categorias e subcategorias em toda a árvore.
       * @param {object[]} nodes
       * @returns {number}
       */
      function countAllCategories(nodes = CATALOG.categories) {
        let c = 0;
        nodes.forEach((n) => {
          c++;
          if (n.children) c += countAllCategories(n.children);
        });
        return c;
      }

      /**
       * Achata a árvore em uma lista plana de templates,
       * anexando a propriedade `_category` com o caminho legível.
       * Usado para busca global e ordenação.
       * @param {object[]} nodes
       * @param {string[]} breadcrumb  Acumulador (nomes das categorias).
       * @param {object[]} acc         Acumulador de templates.
       * @returns {object[]}
       */
      function collectAllTemplates(
        nodes = CATALOG.categories,
        breadcrumb = [],
        acc = [],
      ) {
        for (const n of nodes) {
          const path = [...breadcrumb, n.name];
          (n.templates || []).forEach((t) =>
            acc.push({ ...t, _category: path.join(" / ") }),
          );
          if (n.children) collectAllTemplates(n.children, path, acc);
        }
        return acc;
      }

      /**
       * Coleta todas as tags únicas do catálogo, em ordem alfabética.
       * @returns {string[]}
       */
      function collectAllTags() {
        const tags = new Set();
        collectAllTemplates().forEach((t) =>
          (t.tags || []).forEach((x) => tags.add(x)),
        );
        return [...tags].sort();
      }

      /**
       * Localiza um template pelo id em qualquer ponto da árvore.
       * Devolve também a trilha de nós-pai (útil para breadcrumb).
       * @param {string} id
       * @param {object[]} nodes   (uso interno na recursão)
       * @param {object[]} trail   (uso interno na recursão)
       * @returns {{template:object, trail:object[]}|null}
       */
      function findTemplateById(id, nodes = CATALOG.categories, trail = []) {
        for (const n of nodes) {
          const t = (n.templates || []).find((x) => x.id === id);
          if (t) return { template: t, trail: [...trail, n] };
          if (n.children) {
            const r = findTemplateById(id, n.children, [...trail, n]);
            if (r) return r;
          }
        }
        return null;
      }

      /**
       * Devolve a descrição do "nível atual": que pastas e templates
       * a área central deve mostrar para o caminho/virtualPath atual.
       *
       * Casos:
       *  - state.virtualPath === "__favs"    → lista só favoritos
       *  - state.virtualPath === "__recent"  → lista só histórico
       *  - state.path vazio                  → raiz: todas categorias + todos templates
       *  - state.path preenchido             → nó específico
       *
       * @returns {{
       *   isRoot:boolean, subcategories:object[], templates:object[],
       *   title:string, description:string, isVirtual?:boolean
       * }}
       */
      function getCurrentLevel() {
        if (state.virtualPath === "__favs") {
          const tpls = collectAllTemplates().filter((t) =>
            state.favorites.has(t.id),
          );
          return {
            isRoot: false,
            isVirtual: true,
            subcategories: [],
            templates: tpls,
            title: "Favoritos",
            description: tpls.length
              ? "Seus templates marcados com estrela."
              : "Você ainda não favoritou nenhum template. Clique na estrela em qualquer card para marcar.",
          };
        }
        if (state.virtualPath === "__recent") {
          // Mantém a ordem do histórico (mais recente primeiro)
          const all = collectAllTemplates();
          const map = new Map(all.map((t) => [t.id, t]));
          const tpls = state.history.map((id) => map.get(id)).filter(Boolean);
          return {
            isRoot: false,
            isVirtual: true,
            subcategories: [],
            templates: tpls,
            title: "Vistos recentemente",
            description: tpls.length
              ? "Templates que você abriu há pouco tempo."
              : "Seu histórico está vazio — abra alguns templates para vê-los aqui.",
          };
        }

        if (state.path.length === 0) {
          return {
            isRoot: true,
            subcategories: CATALOG.categories,
            templates: collectAllTemplates(),
            title: "Todos os templates",
            description:
              "Explore a coleção completa. Filtre, busque e abra templates em segundos.",
          };
        }

        const node = getNodeByPath(state.path);
        if (!node) {
          // path inválido → volta pra raiz silenciosamente
          state.path = [];
          return getCurrentLevel();
        }
        return {
          isRoot: false,
          subcategories: node.children || [],
          templates: collectAllTemplates([node]),
          title: node.name,
          description: node.description || "",
        };
      }

      /* ===================================================================
   FAVORITOS  &  HISTÓRICO
   =================================================================== */

      /**
       * Alterna o estado de favorito de um template.
       * @param {string} id
       * @returns {boolean} novo estado (true = favoritado)
       */
      function toggleFavorite(id) {
        const wasFav = state.favorites.has(id);
        if (wasFav) state.favorites.delete(id);
        else state.favorites.add(id);
        saveStorage(STORAGE.favorites, [...state.favorites]);
        return !wasFav;
      }

      /**
       * Empurra um id no histórico (sem duplicar). Mantém só os últimos N.
       * @param {string} id
       */
      function pushHistory(id) {
        state.history = [id, ...state.history.filter((x) => x !== id)].slice(
          0,
          HISTORY_LIMIT,
        );
        saveStorage(STORAGE.history, state.history);
      }

      /* ===================================================================
   URL HASH ROUTING
   =================================================================== */

      /**
       * Lê o hash atual da URL e atualiza state.path/state.viewingId.
       *
       * Rotas suportadas:
       *   #/                       → raiz
       *   #/cat/sub                → navegação por categorias
       *   #/view/:id               → viewer interno do template
       *   #/favs                   → favoritos
       *   #/recent                 → vistos recentemente
       */
      function readHash() {
        const h = location.hash.replace(/^#\/?/, "");
        state.viewingId = null;
        state.virtualPath = null;
        state.path = [];

        if (!h) return;
        const parts = h.split("/").filter(Boolean);

        if (parts[0] === "view" && parts[1]) {
          state.viewingId = parts[1];
        } else if (parts[0] === "favs") {
          state.virtualPath = "__favs";
        } else if (parts[0] === "recent") {
          state.virtualPath = "__recent";
        } else {
          state.path = parts;
        }
      }

      /**
       * Reflete o state atual de volta no hash da URL,
       * sem disparar reload nem entrar no histórico do navegador.
       */
      function writeHash() {
        let h;
        if (state.viewingId) h = "#/view/" + state.viewingId;
        else if (state.virtualPath === "__favs") h = "#/favs";
        else if (state.virtualPath === "__recent") h = "#/recent";
        else if (state.path.length) h = "#/" + state.path.join("/");
        else h = "#/";
        if (location.hash !== h) history.replaceState(null, "", h);
      }

      /* ----- Helpers de navegação programática ------------------------- */

      /** Volta para a raiz do hub. */
      function goHome() {
        state.path = [];
        state.viewingId = null;
        state.virtualPath = null;
        update();
      }
      /** Vai para a página de favoritos. */
      function goFavorites() {
        state.virtualPath = "__favs";
        state.viewingId = null;
        state.path = [];
        update();
      }
      /** Vai para a página de vistos recentemente. */
      function goRecent() {
        state.virtualPath = "__recent";
        state.viewingId = null;
        state.path = [];
        update();
      }
      /** Abre um template no viewer interno. */
      function openTemplate(id) {
        state.viewingId = id;
        state.fullscreen = false;
        pushHistory(id);
        update();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      /** Fecha o viewer e volta para a listagem. */
      function closeTemplate() {
        state.viewingId = null;
        state.fullscreen = false;
        update();
      }

      /* ===================================================================
   FILTRO E ORDENAÇÃO
   =================================================================== */

      /**
       * Aplica busca textual e filtro de tag a uma lista de templates.
       * @param {object[]} list
       * @returns {object[]}
       */
      function applyFilters(list) {
        let out = list.slice();
        const q = state.query.toLowerCase().trim();
        if (q) {
          out = out.filter((t) => {
            const hay =
              `${t.title} ${t.description || ""} ${(t.tags || []).join(" ")} ${t._category || ""}`.toLowerCase();
            return hay.includes(q);
          });
        }
        if (state.tag) {
          out = out.filter((t) => (t.tags || []).includes(state.tag));
        }
        return out;
      }

      /**
       * Ordena templates conforme `state.sort`.
       * @param {object[]} list
       * @returns {object[]}  (mesma referência mutada)
       */
      function applySort(list) {
        const cmpDate = (a, b) => (b.date || "").localeCompare(a.date || "");
        const cmpAz = (a, b) => a.title.localeCompare(b.title, "pt-br");
        switch (state.sort) {
          case "oldest":
            list.sort((a, b) => -cmpDate(a, b));
            break;
          case "az":
            list.sort(cmpAz);
            break;
          case "za":
            list.sort((a, b) => -cmpAz(a, b));
            break;
          case "recent":
          default:
            list.sort(cmpDate);
            break;
        }
        return list;
      }

      /** Limpa busca e filtro de tag. */
      function clearFilters() {
        state.query = "";
        state.tag = "";
        $("#quickSearch").value = "";
        update();
      }

      /* ===================================================================
   RENDER — SIDEBAR (atalhos rápidos + árvore de categorias)
   =================================================================== */

      /**
       * Renderiza os atalhos rápidos da sidebar:
       * Todos / Favoritos / Vistos recentemente.
       */
      function renderQuickNav() {
        const root = $("#quickNav");
        const total = countAllTemplates();
        const favCt = state.favorites.size;
        const recCt = state.history.length;
        const isHome =
          !state.viewingId && !state.virtualPath && state.path.length === 0;

        root.innerHTML = `
    <button class="tree-item ${isHome ? "active" : ""}" data-action="home">
      <span class="ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </span>
      <span class="name">Todos os templates</span>
      <span class="count">${total}</span>
    </button>

    <button class="tree-item ${state.virtualPath === "__favs" ? "active" : ""}" data-action="favs">
      <span class="ico star">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${favCt ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </span>
      <span class="name">Favoritos</span>
      <span class="count">${favCt}</span>
    </button>

    <button class="tree-item ${state.virtualPath === "__recent" ? "active" : ""}" data-action="recent">
      <span class="ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </span>
      <span class="name">Vistos recentemente</span>
      <span class="count">${recCt}</span>
    </button>
  `;

        // Bind dos cliques (delegação simples)
        $$("#quickNav [data-action]").forEach((btn) => {
          btn.onclick = () => {
            const a = btn.dataset.action;
            if (a === "home") goHome();
            if (a === "favs") goFavorites();
            if (a === "recent") goRecent();
          };
        });
      }

      /**
       * Renderiza a árvore inteira de categorias na sidebar,
       * com expansão preservada via state.expanded.
       */
      function renderTree() {
        const root = $("#categoryTree");
        root.innerHTML = "";
        CATALOG.categories.forEach((cat) =>
          root.appendChild(buildTreeNode(cat, [])),
        );
      }

      /**
       * Constrói um item da árvore (recursivamente seus filhos).
       * @param {object} node       Nó-categoria.
       * @param {string[]} parentPath  Caminho até este nó.
       * @returns {HTMLElement}
       */
      function buildTreeNode(node, parentPath) {
        const path = [...parentPath, node.id];
        const pathKey = path.join("/");
        const hasChildren = (node.children || []).length > 0;

        const wrap = document.createElement("div");
        const btn = document.createElement("button");
        btn.className = "tree-item";

        // Marca como ativo se este caminho casa com o atual
        const isCurrent =
          !state.viewingId &&
          !state.virtualPath &&
          state.path.join("/") === pathKey;
        if (isCurrent) btn.classList.add("active");

        // Decide se está expandido
        // Auto-expande qualquer pasta no caminho atual; ou se está em state.expanded
        const isOnPath = state.path.slice(0, path.length).join("/") === pathKey;
        const isExpanded =
          (isOnPath && hasChildren) || state.expanded.has(pathKey);
        if (isExpanded && hasChildren) btn.classList.add("expanded");

        btn.innerHTML = `
    ${
      hasChildren
        ? `<span class="chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></span>`
        : `<span class="chev"></span>`
    }
    <span class="ico">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
    </span>
    <span class="name">${escapeHtml(node.name)}</span>
    <span class="count">${countTemplatesDeep(node)}</span>
  `;

        btn.onclick = (e) => {
          // Clique na seta apenas alterna expansão (sem navegar)
          if (hasChildren && e.target.closest(".chev")) {
            const open = !btn.classList.contains("expanded");
            btn.classList.toggle("expanded", open);
            const next = btn.nextElementSibling;
            if (next && next.classList.contains("tree-children"))
              next.classList.toggle("open", open);
            // Persiste estado
            if (open) state.expanded.add(pathKey);
            else state.expanded.delete(pathKey);
            saveStorage(STORAGE.expanded, [...state.expanded]);
            return;
          }
          // Clique no nome navega
          state.virtualPath = null;
          state.viewingId = null;
          state.path = path;
          update();
        };
        wrap.appendChild(btn);

        if (hasChildren) {
          const childWrap = document.createElement("div");
          childWrap.className = "tree-children";
          if (isExpanded) childWrap.classList.add("open");
          node.children.forEach((child) => {
            childWrap.appendChild(buildTreeNode(child, path));
          });
          wrap.appendChild(childWrap);
        }
        return wrap;
      }

      /* ===================================================================
   RENDER — BREADCRUMB
   =================================================================== */

      /**
       * Renderiza o breadcrumb conforme o contexto atual:
       * - Em viewer: Hub › trilha de categorias › título do template
       * - Em página virtual: Hub › Favoritos / Vistos recentemente
       * - Em categoria: Hub › cat › sub …
       *
       * @param {{template:object, trail:object[]}|null} found  Resultado de findTemplateById se aplicável.
       */
      function renderBreadcrumb(found) {
        const el = $("#breadcrumb");
        el.innerHTML = "";

        // Sempre começa com "Hub"
        const home = document.createElement("a");
        home.textContent = "Hub";
        home.onclick = goHome;
        el.appendChild(home);

        const addSep = () => {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
          el.appendChild(sep);
        };

        // Página virtual (favoritos/recentes)
        if (state.virtualPath) {
          addSep();
          const here = document.createElement("span");
          here.className = "here";
          here.textContent =
            state.virtualPath === "__favs"
              ? "Favoritos"
              : "Vistos recentemente";
          el.appendChild(here);
          return;
        }

        // Viewer interno: usa trilha do template
        if (found) {
          found.trail.forEach((node, i) => {
            addSep();
            const a = document.createElement("a");
            a.textContent = node.name;
            a.onclick = () => {
              state.viewingId = null;
              state.path = found.trail.slice(0, i + 1).map((n) => n.id);
              update();
            };
            el.appendChild(a);
          });
          addSep();
          const here = document.createElement("span");
          here.className = "here";
          here.textContent = found.template.title;
          el.appendChild(here);
          return;
        }

        // Browse normal por categorias
        let walked = [];
        state.path.forEach((id, i) => {
          walked.push(id);
          const myPath = [...walked];
          const node = getNodeByPath(myPath);
          addSep();
          const last = i === state.path.length - 1;
          const item = document.createElement(last ? "span" : "a");
          item.textContent = node ? node.name : id;
          if (last) item.className = "here";
          else
            item.onclick = () => {
              state.path = myPath;
              update();
            };
          el.appendChild(item);
        });
      }

      /* ===================================================================
   RENDER — CABEÇALHO DA PÁGINA
   =================================================================== */

      /**
       * Atualiza título, descrição e stats no topo da página.
       * No viewer, mostra dados do template aberto e esconde stats.
       * @param {object} level  Saída de getCurrentLevel().
       * @param {{template:object, trail:object[]}|null} found
       */
      function renderHeader(level, found) {
        if (found) {
          $("#pageTitle").textContent = found.template.title;
          $("#pageLead").textContent = found.template.description || "";
          $("#pageStats").style.display = "none";
          return;
        }
        $("#pageTitle").textContent = level.title;
        $("#pageLead").textContent = level.description || "";
        $("#pageStats").style.display = "";
        $("#statTemplates").textContent = level.templates.length;
        $("#statCategories").textContent = level.isRoot
          ? countAllCategories()
          : level.subcategories.length || 0;
      }

      /* ===================================================================
   RENDER — TOOLBAR DE FILTROS
   =================================================================== */

      /**
       * Reconstrói os chips de tag e sincroniza o select de ordenação.
       * Esconde a toolbar quando o viewer está aberto.
       */
      function renderFilters() {
        const viewing = !!state.viewingId;
        $("#filters").style.display = viewing ? "none" : "";

        // Remove chips antigos exceto o "Todos" e o toolbar-right
        $$("#filters .chip:not(#chipAll)").forEach((el) => el.remove());

        const filtersEl = $("#filters");
        const toolbarRight = filtersEl.querySelector(".toolbar-right");

        const chipAll = $("#chipAll");
        chipAll.classList.toggle("active", state.tag === "");
        chipAll.onclick = () => {
          state.tag = "";
          update();
        };

        collectAllTags().forEach((tag) => {
          const chip = document.createElement("button");
          chip.className = "chip";
          if (state.tag === tag) chip.classList.add("active");
          chip.textContent = tag;
          chip.onclick = () => {
            state.tag = state.tag === tag ? "" : tag;
            update();
          };
          filtersEl.insertBefore(chip, toolbarRight);
        });

        // Sync do select de sort
        $("#sortSelect").value = state.sort;
      }

      /* ===================================================================
   RENDER — SUBCATEGORIAS (cards de pasta)
   =================================================================== */

      /**
       * Renderiza os "folder cards" das subcategorias do nível atual.
       * @param {object} level
       * @returns {string} HTML
       */
      function renderSubcategories(level) {
        if (!level.subcategories || !level.subcategories.length) return "";
        const cards = level.subcategories
          .map((sub) => {
            const tplCount = countTemplatesDeep(sub);
            const childCount = (sub.children || []).length;
            return `
      <button class="folder-card" data-go="${sub.id}">
        <div class="ico-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        </div>
        <div class="info">
          <div class="name">${escapeHtml(sub.name)}</div>
          <div class="meta">${tplCount} templates${childCount ? ` · ${childCount} subpastas` : ""}</div>
        </div>
        <div class="arr">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </button>
    `;
          })
          .join("");

        return `
    <div class="section-title">
      <h2>${state.path.length ? "Subpastas" : "Categorias"}</h2>

    </div>

  `;
      }

      /* ===================================================================
   RENDER — LISTA DE TEMPLATES (grid / lista)
   =================================================================== */

      /**
       * Gera o HTML dos cards de templates após aplicar filtros e ordenação.
       * Devolve string vazia se vazia + tem subpastas; mostra empty state caso contrário.
       * @param {object} level
       * @returns {string}
       */
      function renderTemplates(level) {
        let list = applyFilters(level.templates);
        applySort(list);

        if (!list.length) {
          if (state.query || state.tag) {
            return emptyState({
              icon: searchSvg(),
              title: "Nenhum template encontrado",
              sub: `Tente outros termos ou <a data-clear>limpe os filtros</a>.`,
            });
          }
          if (level.isVirtual) {
            return emptyState({
              icon: level.title === "Favoritos" ? starSvg() : clockSvg(),
              title:
                level.title === "Favoritos"
                  ? "Sem favoritos ainda"
                  : "Histórico vazio",
              sub: level.description,
            });
          }
          if (level.subcategories.length) return ""; // só pastas, ok
          return emptyState({
            icon: boxSvg(),
            title: "Categoria vazia",
            sub: "Adicione templates em <code>data.js</code> para começar.",

        return `

    <div class="templates ${state.view}-view">${cards}</div>
  `;

       * HTML de um único card de template.
       * @param {object} t
       * @returns {string}

      function renderCard(t) {
        const isFav = state.favorites.has(t.id);
        return `
    <article class="tpl-card" data-open="${t.id}">
